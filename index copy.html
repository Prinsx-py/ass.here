<!DOCTYPE html>
<html lang="en" class="bg-zinc-950 text-zinc-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ass.here | The .ass library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 🚨 Bringing in the Supabase Engine -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen flex flex-col items-center p-6 font-sans">

  <div class="text-center mt-10 mb-8 w-full max-w-4xl">
    <h1 class="text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-500 mb-2">
      ass.here
    </h1>
    <p class="text-zinc-400 font-medium tracking-wide">the open-source karaoke & sub registry</p>
  </div>

  <!-- Real Search Bar -->
  <div class="w-full max-w-4xl mb-12">
    <div class="relative">
      <input 
        type="text" 
        id="search-input"
        placeholder="Search track, artist, or karaoke source..." 
        class="w-full bg-zinc-900 border-2 border-zinc-800 rounded-2xl px-6 py-4 text-lg text-white focus:outline-none focus:border-purple-500 transition-colors shadow-lg"
      />
      <span class="absolute right-4 top-4 text-2xl cursor-pointer" id="search-btn">🔍</span>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl flex-grow">
    
    <!-- Upload Zone (Unchanged visually, but ready for logic) -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl h-fit">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><span>📤</span> Drop a File</h2>
      <form id="ass-upload-form" class="flex flex-col gap-4">
        <input type="file" id="ass-file" accept=".ass" required class="block w-full text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-purple-500/10 file:text-purple-400 cursor-pointer bg-zinc-950 p-2 border border-zinc-800 rounded-xl" />
        <div class="grid grid-cols-2 gap-4">
          <input type="text" id="track-name" placeholder="Track Name" required class="bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2 focus:border-purple-500" />
          <input type="text" id="artist-name" placeholder="Artist" required class="bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2 focus:border-purple-500" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <input type="text" id="source-media" placeholder="Source (KTV/Anime/OPM)" required class="bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2 focus:border-purple-500" />
          <input type="number" id="audio-duration" step="0.1" placeholder="Audio Duration (s)" required class="bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2 focus:border-purple-500" />
        </div>
        <label class="flex items-center gap-2 text-sm text-zinc-400 cursor-pointer mt-2">
          <input type="checkbox" id="karaoke-fx" class="w-4 h-4 accent-purple-500 rounded bg-zinc-950 border-zinc-800" />
          Includes Per-Syllable Karaoke FX ✨
        </label>
        <button type="submit" class="mt-4 w-full py-3 px-4 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-xl transition-colors shadow-lg shadow-purple-500/20">Push to Cloud ☁️</button>
      </form>
    </div>

    <!-- Live Feed Container (No more fake data!) -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl flex flex-col gap-4 h-fit">
      <h2 class="text-xl font-bold flex items-center gap-2 mb-2"><span>🔥</span> Live Drops</h2>
      <div id="feed-container" class="flex flex-col gap-3">
        <p class="text-zinc-500 text-sm text-center py-4">Loading real files from database...</p>
      </div>
    </div>

  </div>

  <!-- 🚨 THE REAL LOGIC 🚨 -->
  <script>
    // 1. Hook up your database (You need to paste your keys here!)
    const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL_HERE';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const feedContainer = document.getElementById('feed-container');

    // 2. Function to fetch REAL data from your 'ass_tracks' table
    async function fetchDrops(searchQuery = '') {
      let query = supabase.from('ass_tracks').select('*').order('created_at', { ascending: false }).limit(10);
      
      if (searchQuery) {
        // Searches track name OR artist if the user types something
        query = query.or(`track_name.ilike.%${searchQuery}%,artist_name.ilike.%${searchQuery}%`);
      }

      const { data, error } = await query;

      if (error) {
        feedContainer.innerHTML = `<p class="text-red-500 text-sm">Error loading data: ${error.message}</p>`;
        return;
      }

      if (data.length === 0) {
        feedContainer.innerHTML = `<p class="text-zinc-500 text-sm text-center py-4">No .ass files found. Be the first to upload! 🥀</p>`;
        return;
      }

      // 3. Render the actual database rows to the screen (safe DOM creation)
      feedContainer.innerHTML = '';
      (data || []).forEach(track => {
        const card = document.createElement('div');
        card.className = 'p-4 bg-zinc-950 rounded-xl border border-zinc-800 flex justify-between items-center hover:border-purple-500/50 transition-colors cursor-pointer group';

        const left = document.createElement('div');
        const title = document.createElement('p');
        title.className = 'font-bold text-zinc-300 group-hover:text-purple-300 transition-colors';
        title.textContent = track.track_name || '';

        if (track.has_karaoke_fx) {
          const badge = document.createElement('span');
          badge.className = 'text-xs bg-purple-500/20 text-purple-300 px-2 py-0.5 rounded-full ml-1';
          badge.textContent = 'FX ✨';
          title.appendChild(badge);
        }

        left.appendChild(title);

        const meta = document.createElement('p');
        meta.className = 'text-xs text-zinc-500 mt-1';
        meta.textContent = `${track.artist_name || ''} • ${track.source_media || ''}`;
        left.appendChild(meta);

        const right = document.createElement('div');
        right.className = 'text-right';

        const dur = document.createElement('span');
        dur.className = 'text-xs font-mono bg-zinc-800 px-2 py-1 rounded text-zinc-400';
        dur.textContent = `${track.duration || ''}s`;
        right.appendChild(dur);

        const a = document.createElement('a');
        a.href = track.file_url || '#';
        a.target = '_blank';
        a.className = 'block text-[10px] text-purple-400 mt-1 hover:underline';
        a.textContent = 'Download';
        right.appendChild(a);

        card.appendChild(left);
        card.appendChild(right);
        feedContainer.appendChild(card);
      });
    }

    // Load drops when the page opens
    // NOTE: This will fail until you put your real Supabase keys at the top of this script!
    fetchDrops();

    // Hook up the live search bar
    document.getElementById('search-input').addEventListener('input', (e) => {
      fetchDrops(e.target.value);
    });

  </script>
</body>
</html>
