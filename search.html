<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search · ass.here</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-black text-white p-6 font-sans">
  <main class="max-w-4xl mx-auto">
    <header class="mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-black text-red-400">Search results</h1>
        <p class="text-zinc-400 text-sm">Results for your query</p>
      </div>
      <div class="flex items-center gap-3">
        <a href="/index.html" class="text-sm text-zinc-300 underline">Back</a>
      </div>
    </header>

    <div class="mb-6">
      <input id="search-input" class="w-full bg-zinc-950 border border-red-700 rounded-xl px-4 py-3 text-white" />
    </div>

    <section id="results" class="grid gap-4"></section>
  </main>

  <script>
    // API Configuration Module (Browser-compatible)
    const apiConfig = {
      defaultBase: 'https://ass.here',
      fallbackBases: ['https://api.ass.here'],
      timeout: 10000,
      retryCount: 2,

      getApiBase() {
        const stored = localStorage.getItem('ASS_HERE_API_BASE');
        if (stored) return stored;
        return this.defaultBase;
      },

      setApiBase(url) {
        if (url) {
          try {
            new URL(url);
            localStorage.setItem('ASS_HERE_API_BASE', url);
            return true;
          } catch (err) {
            console.error('Invalid URL:', err);
            return false;
          }
        } else {
          localStorage.removeItem('ASS_HERE_API_BASE');
          return true;
        }
      },

      getCandidateUrls() {
        const candidates = [];
        const stored = localStorage.getItem('ASS_HERE_API_BASE');
        if (stored) candidates.push(stored);
        candidates.push(this.defaultBase);
        candidates.push(...this.fallbackBases);
        return [...new Set(candidates)];
      },

      async fetch(endpoint, options = {}) {
        const candidates = this.getCandidateUrls();
        let lastError = null;

        for (let attempt = 0; attempt < this.retryCount + 1; attempt++) {
          for (const baseUrl of candidates) {
            try {
              const url = new URL(endpoint, baseUrl).toString();
              const controller = new AbortController();
              const timeoutId = setTimeout(() => controller.abort(), this.timeout);

              const response = await fetch(url, {
                ...options,
                signal: controller.signal
              });

              clearTimeout(timeoutId);

              if (!response.ok && attempt < this.retryCount) {
                lastError = new Error(`HTTP ${response.status}`);
                continue;
              }

              return response;
            } catch (err) {
              lastError = err;
              continue;
            }
          }
        }

        const error = new Error(lastError?.message || 'API unreachable');
        error.candidates = candidates;
        throw error;
      },

      async fetchJson(endpoint, options = {}) {
        const response = await this.fetch(endpoint, options);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      }
    };

    const API_BASE = apiConfig.getApiBase();

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name) || '';
    }

    const query = getQueryParam('q');
    const searchInput = document.getElementById('search-input');
    const resultsEl = document.getElementById('results');

    if (searchInput) searchInput.value = query;

    async function fetchResults(q) {
      resultsEl.innerHTML = '<p class="text-zinc-500">Loading…</p>';
      try {
        const resp = await apiConfig.fetch(`/api/tracks?query=${encodeURIComponent(q || '')}`);
        if (!resp.ok) {
          const txt = await resp.text();
          resultsEl.innerHTML = `<p class="text-red-400">Error: ${txt || resp.statusText}</p>`;
          return;
        }
        const json = await resp.json();
        const data = json.data || [];
        if (!data.length) {
          resultsEl.innerHTML = '<p class="text-zinc-500">It seems nobody made this, be the first one to make one</p>';
          return;
        }
        // Render results safely to avoid stored XSS
        resultsEl.innerHTML = '';
        (data || []).forEach(item => {
          const card = document.createElement('div');
          card.className = 'p-4 bg-zinc-950 rounded-xl border border-zinc-800 flex justify-between items-center';

          const left = document.createElement('div');
          const title = document.createElement('p');
          title.className = 'font-bold text-white';
          title.textContent = item.track_name || '';
          left.appendChild(title);

          const meta = document.createElement('p');
          meta.className = 'text-xs text-zinc-500 mt-1';
          meta.textContent = `${item.artist_name || ''} • ${item.source_type || ''}`;
          left.appendChild(meta);

          const right = document.createElement('div');
          right.className = 'text-right';

          const dur = document.createElement('span');
          dur.className = 'text-xs font-mono bg-zinc-800 px-2 py-1 rounded text-zinc-400';
          dur.textContent = `${item.duration || ''}s`;
          right.appendChild(dur);

          const a = document.createElement('a');
          a.href = item.file_url || '#';
          a.target = '_blank';
          a.className = 'text-red-400 text-xs mt-1 inline-block hover:underline';
          a.textContent = 'Download';
          right.appendChild(a);

          card.appendChild(left);
          card.appendChild(right);
          resultsEl.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        if (err.message.includes('unreachable')) {
          resultsEl.innerHTML = `<p class="text-red-400">❌ API Unreachable: ${err.message}</p>
            <p class="text-zinc-400 text-sm mt-2">Check your internet connection or configure a custom API base URL. <a href="/" class="underline">Go back</a> and use API Settings.</p>`;
        } else {
          resultsEl.innerHTML = `<p class="text-red-400">Error: ${err?.message || 'Failed to load results'}</p>`;
        }
      }
    }

    // Trigger search on Enter
    searchInput?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const q = searchInput.value.trim();
        window.location.search = `?q=${encodeURIComponent(q)}`;
      }
    });

    // initial fetch
    fetchResults(query);
  </script>
</body>
</html>
